services:
  - type: web
    name: ethoslife-saft-platform
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ethoslife-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FOUNDER_CHAT_ID
        sync: false
      - key: ADMIN_CHAT_IDS
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: PGSSLMODE
        value: no-verify
    autoDeploy: true

databases:
  - name: ethoslife-db
    plan: free
    databaseName: ethoslife
    user: ethoslife
