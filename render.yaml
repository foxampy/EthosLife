services:
  # Single service: API + Frontend combined
  - type: web
    name: ethoslife
    runtime: node
    plan: starter
    buildCommand: npm install && cd frontend && npm install && npm run build
    startCommand: npm start
    rootDir: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ethoslife-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FOUNDER_CHAT_ID
        sync: false
      - key: ADMIN_CHAT_IDS
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: QWEN_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: PGSSLMODE
        value: no-verify
    autoDeploy: true

databases:
  - name: ethoslife-db
    plan: free
    databaseName: ethoslife
    user: ethoslife
