<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EthosLife - Human Operating System for Health" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <title>EthosLife</title>
    
    <!-- Initial Loader Styles - Retrofuturism Neumorphism -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      :root {
        --bone: #e4dfd5;
        --bone-dark: #c8c2b6;
        --sand: #dcd3c6;
        --stone: #5c5243;
        --ink: #2d2418;
        --clay: #8c7a6b;
        --shadow-light: rgba(255, 255, 255, 0.6);
        --shadow-dark: rgba(44, 40, 34, 0.15);
      }
      
      body {
        font-family: 'Space Grotesk', sans-serif;
        background: var(--bone);
        min-height: 100vh;
      }
      
      /* Initial Loader Container */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: var(--bone);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      
      #initial-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      
      /* Main Widget Container - Neumorphic */
      .loader-widget {
        background: linear-gradient(145deg, var(--bone), var(--sand));
        padding: 3rem;
        border-radius: 30px;
        box-shadow: 
          20px 20px 60px var(--shadow-dark),
          -20px -20px 60px var(--shadow-light),
          inset 1px 1px 1px rgba(255,255,255,0.4);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        min-width: 320px;
        max-width: 90vw;
      }
      
      /* Logo Container - Tactile Button Style */
      .loader-logo-container {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: linear-gradient(145deg, var(--bone), var(--sand));
        box-shadow: 
          12px 12px 24px var(--shadow-dark),
          -12px -12px 24px var(--shadow-light),
          inset 2px 2px 4px rgba(255,255,255,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        animation: breathe 3s ease-in-out infinite;
      }
      
      @keyframes breathe {
        0%, 100% { 
          transform: scale(1);
          box-shadow: 
            12px 12px 24px var(--shadow-dark),
            -12px -12px 24px var(--shadow-light),
            inset 2px 2px 4px rgba(255,255,255,0.5);
        }
        50% { 
          transform: scale(1.02);
          box-shadow: 
            16px 16px 32px var(--shadow-dark),
            -16px -16px 32px var(--shadow-light),
            inset 2px 2px 4px rgba(255,255,255,0.5);
        }
      }
      
      .loader-logo {
        font-size: 4rem;
        filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
        animation: pulse 2s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.9; }
      }
      
      /* Brand Text */
      .loader-brand {
        text-align: center;
      }
      
      .loader-brand h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.75rem;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
      }
      
      .loader-brand p {
        font-family: 'Inter', sans-serif;
        font-size: 0.875rem;
        color: var(--clay);
        font-weight: 400;
        letter-spacing: 0.02em;
      }
      
      /* Progress Bar Container - Inset Neumorphic */
      .loader-progress-container {
        width: 100%;
        max-width: 280px;
        height: 12px;
        background: linear-gradient(145deg, var(--sand), var(--bone));
        border-radius: 20px;
        box-shadow: 
          inset 3px 3px 6px var(--shadow-dark),
          inset -3px -3px 6px var(--shadow-light);
        padding: 3px;
        overflow: hidden;
      }
      
      .loader-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--stone) 0%, var(--clay) 50%, var(--stone) 100%);
        border-radius: 15px;
        box-shadow: 
          2px 0 8px rgba(92, 82, 67, 0.4),
          inset 0 1px 2px rgba(255,255,255,0.3);
        transition: width 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      
      .loader-progress-bar::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255,255,255,0.3) 50%,
          transparent 100%
        );
        animation: shimmer 1.5s infinite;
      }
      
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
      
      /* Status Text */
      .loader-status {
        font-family: 'Space Grotesk', monospace;
        font-size: 0.75rem;
        color: var(--stone);
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      
      .loader-dots {
        display: inline-flex;
        gap: 3px;
      }
      
      .loader-dots span {
        animation: dot 1.4s infinite ease-in-out both;
        opacity: 0.4;
      }
      
      .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
      .loader-dots span:nth-child(2) { animation-delay: -0.16s; }
      .loader-dots span:nth-child(3) { animation-delay: 0s; }
      
      @keyframes dot {
        0%, 80%, 100% { opacity: 0.4; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1); }
      }
      
      /* Widget Badge */
      .loader-badge {
        position: absolute;
        top: -10px;
        right: -10px;
        background: linear-gradient(145deg, var(--stone), var(--ink));
        color: var(--bone);
        font-size: 0.65rem;
        font-weight: 600;
        padding: 0.35rem 0.75rem;
        border-radius: 20px;
        box-shadow: 
          3px 3px 8px var(--shadow-dark),
          -2px -2px 6px var(--shadow-light);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      
      /* Responsive */
      @media (max-width: 480px) {
        .loader-widget {
          padding: 2rem;
          min-width: 280px;
        }
        
        .loader-logo-container {
          width: 100px;
          height: 100px;
        }
        
        .loader-logo {
          font-size: 3rem;
        }
        
        .loader-brand h1 {
          font-size: 1.5rem;
        }
      }
      
      /* Hide loader when React mounts */
      #root:not(:empty) ~ #initial-loader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-tn7ot9Jr.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CgcJCzUj.css">
  </head>
  <body>
    <!-- Initial Loader - Shows immediately -->
    <div id="initial-loader">
      <div class="loader-widget">
        <div style="position: relative;">
          <div class="loader-logo-container">
            <span class="loader-logo">🌱</span>
          </div>
          <span class="loader-badge">v2.0</span>
        </div>
        
        <div class="loader-brand">
          <h1>EthosLife</h1>
          <p>Human Operating System</p>
        </div>
        
        <div class="loader-progress-container">
          <div class="loader-progress-bar" id="loader-progress"></div>
        </div>
        
        <div class="loader-status">
          Initializing
          <span class="loader-dots">
            <span>●</span>
            <span>●</span>
            <span>●</span>
          </span>
        </div>
      </div>
    </div>
    
    <!-- React App Mounts Here -->
    <div id="root"></div>
    
    <!-- Progress Animation Script -->
    <script>
      (function() {
        const progressBar = document.getElementById('loader-progress');
        const loader = document.getElementById('initial-loader');
        let progress = 0;
        
        // Simulate loading progress
        const interval = setInterval(function() {
          progress += Math.random() * 15;
          if (progress > 90) progress = 90; // Hold at 90% until React loads
          if (progressBar) {
            progressBar.style.width = progress + '%';
          }
        }, 200);
        
        // Hide loader when page fully loaded
        window.addEventListener('load', function() {
          clearInterval(interval);
          if (progressBar) progressBar.style.width = '100%';
          
          setTimeout(function() {
            if (loader) loader.classList.add('hidden');
          }, 500);
        });
        
        // Fallback: hide after 10 seconds max
        setTimeout(function() {
          clearInterval(interval);
          if (loader) loader.classList.add('hidden');
        }, 10000);
      })();
    </script>
    
  </body>
</html>
