            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
        }
        .matte-switch-knob::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);

            border-radius: 50%;
            background: #cfc6b6;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.1);
        }.screw-matte {
            position: absolute;

            content: '';

            box-shadow: 0px 1px 0px rgba(255,255,255,0.5);
